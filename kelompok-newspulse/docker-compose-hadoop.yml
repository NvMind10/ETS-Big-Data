version: '3.8'

services:
  namenode:
    image: bde2020/hadoop-namenode:2.0.0-hadoop3.3.1-java11
    container_name: namenode
    restart: always
    ports:
      - "9870:9870"
      - "9000:9000"
    environment:
      CLUSTER_NAME: hadoop-cluster
    env_file:
      - hadoop.env
    volumes:
      - namenode:/hadoop/dfs/name
    networks:
      - news-network

  datanode1:
    image: bde2020/hadoop-datanode:2.0.0-hadoop3.3.1-java11
    container_name: datanode1
    restart: always
    ports:
      - "9864:9864"
    environment:
      SERVICE_PRECONDITION: "namenode:9000"
    env_file:
      - hadoop.env
    volumes:
      - datanode1:/hadoop/dfs/data
    depends_on:
      - namenode
    networks:
      - news-network

  datanode2:
    image: bde2020/hadoop-datanode:2.0.0-hadoop3.3.1-java11
    container_name: datanode2
    restart: always
    ports:
      - "9865:9864"
    environment:
      SERVICE_PRECONDITION: "namenode:9000"
    env_file:
      - hadoop.env
    volumes:
      - datanode2:/hadoop/dfs/data
    depends_on:
      - namenode
    networks:
      - news-network

volumes:
  namenode:
  datanode1:
  datanode2:

networks:
  news-network:
    driver: bridge
